# Railway config for the Express API server (@workspace/api-server).
# In the Railway dashboard set this service's:
#   - Root Directory: / (repo root, required for the pnpm workspace)
#   - Config-as-code path: artifacts/api-server/railway.toml
[build]
builder = "NIXPACKS"
buildCommand = "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
